<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0b0b"/>
      <stop offset="1" stop-color="#242424"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity=".35"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff7900"/>
    </marker>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="0" y="0" width="1600" height="14" fill="#ff7900"/>
  <text x="80" y="92" fill="#fff" font-family="Arial, sans-serif" font-size="52" font-weight="700">Telecom Usage Analytics Platform</text>
  <text x="80" y="139" fill="#bdbdbd" font-family="Arial, sans-serif" font-size="25">New telecom events generated, processed and visualized every 10 minutes</text>

  <rect x="80" y="185" width="1440" height="94" rx="18" fill="#ff7900"/>
  <text x="125" y="228" fill="#111" font-family="Arial, sans-serif" font-size="25" font-weight="700">APACHE AIRFLOW ORCHESTRATION</text>
  <text x="125" y="260" fill="#111" font-family="Arial, sans-serif" font-size="21">Schedule: */10 * * * *   •   retries   •   task monitoring   •   data-quality gates   •   idempotent reruns</text>

  <g filter="url(#shadow)" font-family="Arial, sans-serif">
    <rect x="80" y="354" width="245" height="250" rx="18" fill="#171717" stroke="#4b4b4b" stroke-width="2"/>
    <circle cx="202" cy="410" r="34" fill="#ff7900"/>
    <text x="202" y="420" text-anchor="middle" fill="#111" font-size="29" font-weight="700">1</text>
    <text x="202" y="480" text-anchor="middle" fill="#fff" font-size="27" font-weight="700">Generate Events</text>
    <text x="202" y="520" text-anchor="middle" fill="#ff7900" font-size="23">Python</text>
    <text x="202" y="558" text-anchor="middle" fill="#bdbdbd" font-size="18">Voice • SMS • Data</text>

    <rect x="380" y="354" width="245" height="250" rx="18" fill="#171717" stroke="#4b4b4b" stroke-width="2"/>
    <circle cx="502" cy="410" r="34" fill="#ff7900"/>
    <text x="502" y="420" text-anchor="middle" fill="#111" font-size="29" font-weight="700">2</text>
    <text x="502" y="480" text-anchor="middle" fill="#fff" font-size="27" font-weight="700">Data Lake</text>
    <text x="502" y="520" text-anchor="middle" fill="#ff7900" font-size="23">MinIO / S3</text>
    <text x="502" y="552" text-anchor="middle" fill="#bdbdbd" font-size="17">date / hour / minute</text>
    <text x="502" y="577" text-anchor="middle" fill="#bdbdbd" font-size="17">gzip NDJSON</text>

    <rect x="680" y="354" width="245" height="250" rx="18" fill="#171717" stroke="#ff7900" stroke-width="3"/>
    <circle cx="802" cy="410" r="34" fill="#ff7900"/>
    <text x="802" y="420" text-anchor="middle" fill="#111" font-size="29" font-weight="700">3</text>
    <text x="802" y="480" text-anchor="middle" fill="#fff" font-size="27" font-weight="700">ETL &amp; Quality</text>
    <text x="802" y="520" text-anchor="middle" fill="#ff7900" font-size="23">PySpark</text>
    <text x="802" y="552" text-anchor="middle" fill="#bdbdbd" font-size="17">validate • transform</text>
    <text x="802" y="577" text-anchor="middle" fill="#bdbdbd" font-size="17">join dimensions</text>

    <rect x="980" y="354" width="245" height="250" rx="18" fill="#171717" stroke="#4b4b4b" stroke-width="2"/>
    <circle cx="1102" cy="410" r="34" fill="#ff7900"/>
    <text x="1102" y="420" text-anchor="middle" fill="#111" font-size="29" font-weight="700">4</text>
    <text x="1102" y="480" text-anchor="middle" fill="#fff" font-size="27" font-weight="700">Data Warehouse</text>
    <text x="1102" y="520" text-anchor="middle" fill="#ff7900" font-size="23">PostgreSQL</text>
    <text x="1102" y="552" text-anchor="middle" fill="#bdbdbd" font-size="17">Star schema</text>
    <text x="1102" y="577" text-anchor="middle" fill="#bdbdbd" font-size="17">Facts + dimensions</text>

    <rect x="1280" y="354" width="245" height="250" rx="18" fill="#ff7900"/>
    <circle cx="1402" cy="410" r="34" fill="#111"/>
    <text x="1402" y="420" text-anchor="middle" fill="#ff7900" font-size="29" font-weight="700">5</text>
    <text x="1402" y="480" text-anchor="middle" fill="#111" font-size="27" font-weight="700">Analytics</text>
    <text x="1402" y="518" text-anchor="middle" fill="#111" font-size="18" font-weight="700">Orange Command Center</text>
    <text x="1402" y="552" text-anchor="middle" fill="#2c2c2c" font-size="17">Network • Customers</text>
    <text x="1402" y="577" text-anchor="middle" fill="#2c2c2c" font-size="17">Quality • Cross Analysis</text>
  </g>

  <g stroke="#ff7900" stroke-width="5" fill="none" marker-end="url(#arrow)">
    <path d="M 325 479 L 372 479"/>
    <path d="M 625 479 L 672 479"/>
    <path d="M 925 479 L 972 479"/>
    <path d="M 1225 479 L 1272 479"/>
  </g>

  <rect x="185" y="692" width="360" height="105" rx="16" fill="#2d2d2d" stroke="#555"/>
  <text x="365" y="735" text-anchor="middle" fill="#ff7900" font-family="Arial, sans-serif" font-size="22" font-weight="700">RELIABLE INGESTION</text>
  <text x="365" y="769" text-anchor="middle" fill="#ddd" font-family="Arial, sans-serif" font-size="18">Deterministic batches • safe reruns</text>

  <rect x="620" y="692" width="360" height="105" rx="16" fill="#2d2d2d" stroke="#555"/>
  <text x="800" y="735" text-anchor="middle" fill="#ff7900" font-family="Arial, sans-serif" font-size="22" font-weight="700">DATA QUALITY</text>
  <text x="800" y="769" text-anchor="middle" fill="#ddd" font-family="Arial, sans-serif" font-size="18">Malformed rows quarantined and measured</text>

  <rect x="1055" y="692" width="360" height="105" rx="16" fill="#2d2d2d" stroke="#555"/>
  <text x="1235" y="735" text-anchor="middle" fill="#ff7900" font-family="Arial, sans-serif" font-size="22" font-weight="700">LIVE INTELLIGENCE</text>
  <text x="1235" y="769" text-anchor="middle" fill="#ddd" font-family="Arial, sans-serif" font-size="18">KPIs • drill-downs • associative filters</text>

  <text x="800" y="856" text-anchor="middle" fill="#999" font-family="Arial, sans-serif" font-size="18">Python • MinIO • Apache Airflow • PySpark • PostgreSQL • Metabase • Docker</text>
