services:
  spark-etl:
    image: spark:3.5.1-python3
    profiles: [tools]
    user: "0:0"
    entrypoint:
      - /opt/spark/bin/spark-submit
      - --master
      - local[2]
      - --conf
      - spark.jars.ivy=/tmp/.ivy2
      - --packages
      - org.apache.hadoop:hadoop-aws:3.3.4,org.postgresql:postgresql:42.7.3
      - /opt/telecom/etl/usage_etl.py
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      DWH_POSTGRES_HOST: postgres-dwh
      DWH_POSTGRES_PORT: 5432
      DWH_POSTGRES_DB: ${DWH_POSTGRES_DB}
      DWH_POSTGRES_USER: ${DWH_POSTGRES_USER}
      DWH_POSTGRES_PASSWORD: ${DWH_POSTGRES_PASSWORD}
      ETL_OUTPUT_PARTITIONS: 2
    volumes:
      - ./etl:/opt/telecom/etl:ro
      - spark-ivy-cache:/tmp/.ivy2
    networks: [telecom-net]
    depends_on:
      minio:
        condition: service_healthy
      postgres-dwh:
        condition: service_healthy
