name: CI

on:
  push:
    branches: [main, feat/etl-hourly-metrics]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            dwh/requirements.txt
            frontend/requirements.txt
            generator/requirements.txt

      - uses: actions/setup-java@v6
        with:
          distribution: temurin
          java-version: "17"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            pytest==8.3.5 \
            pyspark==3.5.1 \
            boto3==1.34.144 \
            'psycopg[binary,pool]==3.2.9'

      - name: Validate Python syntax
        run: python -m compileall -q airflow dashboards dwh etl frontend generator

      - name: Run unit tests
        env:
          PYTHONPATH: .
        run: pytest -q etl/tests dwh/tests dashboards/tests frontend/tests

      - name: Validate Docker Compose
        run: |
          cp .env.example .env
          docker compose config --quiet
