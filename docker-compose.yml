# Telecom Usage Data Pipeline — docker-compose
#
# Dev A services: minio, minio-init, airflow-* , generator (utility profile)
# Dev B services: postgres-dwh, metabase (stubs below — filled in Phase 1 by Dev B)
#
# Usage: cp .env.example .env  →  docker compose up -d

name: telecom-pipeline

networks:
  telecom-net:
    driver: bridge

volumes:
  minio-data:
  dwh-data:
  airflow-db-data:
  metabase-data:

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.11
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DEFAULT_TIMEZONE: utc
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: >-
      postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@airflow-db:5432/${AIRFLOW_DB_NAME}
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    # available to DAG tasks
    MINIO_ENDPOINT: http://minio:9000
    MINIO_ROOT_USER: ${MINIO_ROOT_USER}
    MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    MINIO_BUCKET: ${MINIO_BUCKET}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
  user: "${AIRFLOW_UID:-50000}:0"
  networks: [telecom-net]
  depends_on:
    airflow-db:
      condition: service_healthy

services:

  # ────────────────────────────────────────────────────────────────
  # Dev A — data lake & orchestration
  # ────────────────────────────────────────────────────────────────

  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    networks: [telecom-net]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # one-shot: creates the telecom-lake bucket then exits
  minio-init:
    image: minio/mc:RELEASE.2024-06-12T14-34-03Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/$${MINIO_BUCKET} &&
      echo 'bucket ready:' $${MINIO_BUCKET}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
    networks: [telecom-net]

  # utility container for generate/upload/backfill (not started by default):
  #   docker compose run --rm generator backfill.py --hours 48
  generator:
    build: ./generator
    profiles: [tools]
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      GEN_EVENTS_PER_HOUR: ${GEN_EVENTS_PER_HOUR}
      GEN_MALFORMED_RATE: ${GEN_MALFORMED_RATE}
      GEN_NUM_SUBSCRIBERS: ${GEN_NUM_SUBSCRIBERS}
      GEN_NUM_TOWERS: ${GEN_NUM_TOWERS}
    networks: [telecom-net]
    depends_on:
      minio:
        condition: service_healthy

  # Airflow metadata DB — deliberately separate from the DWH postgres
  airflow-db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_DB_NAME}
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
    networks: [telecom-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_DB_USER} -d ${AIRFLOW_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # one-shot: migrates the metadata DB and creates the admin user
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username "$${_AF_USER}" --password "$${_AF_PASS}" \
          --firstname Admin --lastname User --role Admin \
          --email admin@example.com || true
    environment:
      <<: *airflow-env
      _AF_USER: ${AIRFLOW_ADMIN_USER}
      _AF_PASS: ${AIRFLOW_ADMIN_PASSWORD}

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # ────────────────────────────────────────────────────────────────
  # Dev B — warehouse & analytics
  # ────────────────────────────────────────────────────────────────

  # postgres-dwh: (added in Phase 1 by Dev B)
  #   image: postgres:16
  #   ports: ["5432:5432"]
  #   env: DWH_POSTGRES_* from .env, db telecom_dwh, schema dwh
  #   volume: dwh-data:/var/lib/postgresql/data
  #   init: mount dwh/ddl.sql via /docker-entrypoint-initdb.d

  # metabase:     (added in Phase 1 by Dev B)
  #   image: metabase/metabase:latest
  #   ports: ["3000:3000"]
  #   volume: metabase-data:/metabase-data
