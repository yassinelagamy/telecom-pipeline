# Telecom Usage Data Pipeline — docker-compose
#
# Dev A services: minio, minio-init, airflow-* , generator (utility profile)
# Dev B services: postgres-dwh, metabase (stubs below — filled in Phase 1 by Dev B)
#
# Usage: cp .env.example .env  →  docker compose up -d

name: telecom-pipeline

networks:
  telecom-net:
    driver: bridge

volumes:
  minio-data:
  dwh-data:
  airflow-db-data:
  metabase-data:
  spark-ivy-cache:

x-airflow-common: &airflow-common
  build: ./airflow
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DEFAULT_TIMEZONE: utc
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: >-
      postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@airflow-db:5432/${AIRFLOW_DB_NAME}
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    # spark-submit runs local[*] inside the container (D4)
    AIRFLOW_CONN_SPARK_LOCAL: '{"conn_type": "spark", "host": "local[*]"}'
    # available to DAG tasks + the ETL child process
    MINIO_ENDPOINT: http://minio:9000
    MINIO_ROOT_USER: ${MINIO_ROOT_USER}
    MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    MINIO_BUCKET: ${MINIO_BUCKET}
    DWH_POSTGRES_HOST: ${DWH_POSTGRES_HOST}
    DWH_POSTGRES_PORT: ${DWH_POSTGRES_PORT}
    DWH_POSTGRES_DB: ${DWH_POSTGRES_DB}
    DWH_POSTGRES_USER: ${DWH_POSTGRES_USER}
    DWH_POSTGRES_PASSWORD: ${DWH_POSTGRES_PASSWORD}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./etl:/opt/airflow/etl
    - spark-ivy-cache:/home/airflow/.ivy2
  user: "${AIRFLOW_UID:-50000}:0"
  networks: [telecom-net]
  depends_on:
    airflow-db:
      condition: service_healthy

services:

  # ────────────────────────────────────────────────────────────────
  # Dev A — data lake & orchestration
  # ────────────────────────────────────────────────────────────────

  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    networks: [telecom-net]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # one-shot: creates the telecom-lake bucket then exits
  minio-init:
    image: minio/mc:RELEASE.2024-06-12T14-34-03Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/$${MINIO_BUCKET} &&
      echo 'bucket ready:' $${MINIO_BUCKET}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
    networks: [telecom-net]

  # utility container for generate/upload/backfill (not started by default):
  #   docker compose run --rm generator backfill.py --hours 48
  generator:
    build: ./generator
    profiles: [tools]
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      GEN_EVENTS_PER_HOUR: ${GEN_EVENTS_PER_HOUR}
      GEN_MALFORMED_RATE: ${GEN_MALFORMED_RATE}
      GEN_NUM_SUBSCRIBERS: ${GEN_NUM_SUBSCRIBERS}
      GEN_NUM_TOWERS: ${GEN_NUM_TOWERS}
    networks: [telecom-net]
    depends_on:
      minio:
        condition: service_healthy

  # Airflow metadata DB — deliberately separate from the DWH postgres
  airflow-db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_DB_NAME}
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
    networks: [telecom-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_DB_USER} -d ${AIRFLOW_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # one-shot: migrates the metadata DB and creates the admin user
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username "$${_AF_USER}" --password "$${_AF_PASS}" \
          --firstname Admin --lastname User --role Admin \
          --email admin@example.com || true
    environment:
      <<: *airflow-env
      _AF_USER: ${AIRFLOW_ADMIN_USER}
      _AF_PASS: ${AIRFLOW_ADMIN_PASSWORD}

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # ────────────────────────────────────────────────────────────────
  # Dev B — warehouse & analytics
  # ────────────────────────────────────────────────────────────────

  postgres-dwh:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DWH_POSTGRES_USER}
      POSTGRES_PASSWORD: ${DWH_POSTGRES_PASSWORD}
      POSTGRES_DB: ${DWH_POSTGRES_DB}
      TZ: UTC
      PGTZ: UTC
    volumes:
      - dwh-data:/var/lib/postgresql/data
      - ./dwh/ddl.sql:/docker-entrypoint-initdb.d/001-ddl.sql:ro
      - ./dwh/seed.sql:/docker-entrypoint-initdb.d/002-seed.sql:ro
    networks: [telecom-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DWH_POSTGRES_USER} -d ${DWH_POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  metabase:
    image: metabase/metabase:v0.62.4.3
    ports:
      - "3000:3000"
    environment:
      MB_DB_FILE: ${MB_DB_FILE:-/metabase-data/metabase.db}
      JAVA_TIMEZONE: UTC
    volumes:
      - metabase-data:/metabase-data
    networks: [telecom-net]
    depends_on:
      postgres-dwh:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  metabase-init:
    image: python:3.12-alpine
    command: ["python", "/app/setup_metabase.py"]
    environment:
      METABASE_URL: http://metabase:3000
      MB_ADMIN_EMAIL: ${MB_ADMIN_EMAIL}
      MB_ADMIN_PASSWORD: ${MB_ADMIN_PASSWORD}
      MB_SITE_NAME: ${MB_SITE_NAME:-Telecom Analytics}
      DWH_POSTGRES_HOST: postgres-dwh
      DWH_POSTGRES_PORT: 5432
      DWH_POSTGRES_DB: ${DWH_POSTGRES_DB}
      DWH_POSTGRES_USER: ${DWH_POSTGRES_USER}
      DWH_POSTGRES_PASSWORD: ${DWH_POSTGRES_PASSWORD}
    volumes:
      - ./dwh/setup_metabase.py:/app/setup_metabase.py:ro
    networks: [telecom-net]
    depends_on:
      metabase:
        condition: service_healthy
      postgres-dwh:
        condition: service_healthy
    restart: "no"

  orange-frontend:
    build: ./frontend
    ports:
      - "${ORANGE_FRONTEND_PORT:-8088}:8088"
    environment:
      FRONTEND_PORT: 8088
      DWH_POSTGRES_HOST: postgres-dwh
      DWH_POSTGRES_PORT: 5432
      DWH_POSTGRES_DB: ${DWH_POSTGRES_DB}
      DWH_POSTGRES_USER: ${DWH_POSTGRES_USER}
      DWH_POSTGRES_PASSWORD: ${DWH_POSTGRES_PASSWORD}
      FRONTEND_CACHE_TTL: ${FRONTEND_CACHE_TTL:-20}
      FRONTEND_CACHE_MAX: ${FRONTEND_CACHE_MAX:-256}
      TZ: UTC
    networks: [telecom-net]
    depends_on:
      postgres-dwh:
        condition: service_healthy
    restart: unless-stopped
